apiVersion: batch/v1
kind: CronJob
metadata:
  name: tide-tracker
spec:
  schedule: "*/30 * * * *"  # Runs every 30 minutes
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: tide-app
            image: ghcr.io/lrayder2025/ds5220-tides:latest
            imagePullPolicy: Always
            env:
              - name: DYNAMODB_TABLE
                value: "tide-tracking"  # Make sure this matches your AWS table name
              - name: S3_BUCKET
                value: "dataproject-2"
              - name: AWS_REGION
                value: "us-east-1"
          restartPolicy: OnFailure